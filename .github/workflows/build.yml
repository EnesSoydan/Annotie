name: Build Annotie

on:
  push:
    tags:
      - 'v*'         # v1.0.0, v1.1.0 gibi tag'lerde tetiklenir
  workflow_dispatch:  # GitHub arayuzunden manuel tetikleme

permissions:
  contents: write    # Release olusturmak icin gerekli

jobs:
  # ── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimliliklari yukle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: PyInstaller ile derle
        run: python -m PyInstaller Annotie.spec --noconfirm

      - name: ZIP olustur
        shell: pwsh
        run: Compress-Archive -Path dist\Annotie -DestinationPath Annotie-Windows.zip

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: Annotie-Windows
          path: Annotie-Windows.zip

  # ── macOS Build ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bagimliliklari yukle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: icon.png'den icon.icns olustur
        run: |
          python3 -c "
          from PIL import Image
          import os
          img = Image.open('icon.png').convert('RGBA')
          os.makedirs('icon.iconset', exist_ok=True)
          sizes = [
              (16,   'icon_16x16.png'),
              (32,   'icon_16x16@2x.png'),
              (32,   'icon_32x32.png'),
              (64,   'icon_32x32@2x.png'),
              (128,  'icon_128x128.png'),
              (256,  'icon_128x128@2x.png'),
              (256,  'icon_256x256.png'),
              (512,  'icon_256x256@2x.png'),
              (512,  'icon_512x512.png'),
              (1024, 'icon_512x512@2x.png'),
          ]
          for size, fname in sizes:
              img.resize((size, size), Image.LANCZOS).save('icon.iconset/' + fname, 'PNG')
              print('OK:', fname)
          "
          iconutil -c icns icon.iconset -o icon.icns
          echo "icon.icns olusturuldu!"

      - name: PyInstaller ile derle
        run: python -m PyInstaller Annotie_mac.spec --noconfirm

      - name: Ad-hoc imzala (ucretsiz — Apple sertifikasi gerektirmez)
        run: |
          # Ad-hoc imzalama: "-" kimligini kullanir, Apple Developer cert gerekmez.
          # Bu islem "uygulama hasarli" hatasini onler ve Gatekeeper uyarisini
          # "bilinmeyen gelistirici" seviyesine indirir (kullanici sag tik → Ac ile acabilir).
          codesign --deep --force --options runtime --sign - dist/Annotie.app
          echo "Ad-hoc imzalama tamamlandi."
          codesign --verify --verbose dist/Annotie.app

      - name: DMG olustur
        run: |
          # create-dmg: Applications klasoru kisayolu olan profesyonel DMG
          brew install create-dmg
          create-dmg \
            --volname "Annotie" \
            --window-pos 200 120 \
            --window-size 600 380 \
            --icon-size 120 \
            --icon "Annotie.app" 175 165 \
            --hide-extension "Annotie.app" \
            --app-drop-link 425 165 \
            "Annotie-macOS.dmg" \
            "dist/"
          echo "DMG olusturuldu."

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: Annotie-macOS
          path: Annotie-macOS.dmg

  # ── GitHub Release Olustur ─────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Windows artifact indir
        uses: actions/download-artifact@v4
        with:
          name: Annotie-Windows

      - name: macOS artifact indir
        uses: actions/download-artifact@v4
        with:
          name: Annotie-macOS

      - name: GitHub Release olustur
        uses: softprops/action-gh-release@v2
        with:
          name: Annotie ${{ github.ref_name }}
          body: |
            ## Annotie ${{ github.ref_name }}

            ### İndirme / Download

            | Platform | Dosya | Açıklama |
            |----------|-------|----------|
            | 🪟 Windows | `Annotie-Windows.zip` | Windows 10/11 (64-bit) |
            | 🍎 macOS | `Annotie-macOS.dmg` | macOS 11.0+ (Intel & Apple Silicon) |

            ### Kurulum

            **Windows:**
            1. `Annotie-Windows.zip` dosyasını indir ve çıkart
            2. `Annotie.exe` dosyasını çalıştır
            3. SmartScreen uyarısı çıkarsa: **"Daha fazla bilgi"** → **"Yine de çalıştır"**

            **macOS:**
            1. `Annotie-macOS.dmg` dosyasını indir
            2. DMG'yi aç, `Annotie` ikonunu **Uygulamalar** klasörüne sürükle
            3. İlk açılışta Gatekeeper uyarısı çıkarsa: **Sağ tık → Aç → Aç**
            4. Sonraki açılışlarda uyarı çıkmaz

            > Annotie ücretli Apple/Microsoft sertifikasıyla imzalanmamıştır.
            > Bu durum normaldir; kaynak kodu tamamen açıktır.
          files: |
            Annotie-Windows.zip
            Annotie-macOS.dmg
          draft: false
          prerelease: false
